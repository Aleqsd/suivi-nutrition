name: Deploy to OVH

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ovh-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH access
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 51.68.45.129 >> ~/.ssh/known_hosts

      - name: Sync code to the VPS
        shell: bash
        run: |
          ssh ubuntu@51.68.45.129 "mkdir -p /home/ubuntu/GitHub/suivi-nutrition"
          rsync -az --delete --itemize-changes --filter='merge scripts/deploy_rsync.rules' ./ ubuntu@51.68.45.129:/home/ubuntu/GitHub/suivi-nutrition/

      - name: Run unified pipeline on the VPS
        shell: bash
        run: |
          ssh ubuntu@51.68.45.129 \
            "cd /home/ubuntu/GitHub/suivi-nutrition && \
             APP_DIR=/home/ubuntu/GitHub/suivi-nutrition \
             DEPLOY_MODE=standard \
             NETLIFY_SITE_ID='${{ secrets.NETLIFY_SITE_ID }}' \
             NETLIFY_AUTH_TOKEN='${{ secrets.NETLIFY_AUTH_TOKEN }}' \
             DEPLOY_MESSAGE='GitHub Actions ${GITHUB_SHA}' \
             bash scripts/run_vps_deploy_pipeline.sh"

      - name: Smoke test public site
        shell: bash
        run: |
          python3 scripts/smoke_test_site.py public --base-url https://sante.zqsdev.com

      - name: Smoke test VPS dashboard
        shell: bash
        run: |
          ssh ubuntu@51.68.45.129 \
            "cd /home/ubuntu/GitHub/suivi-nutrition && \
             python3 scripts/smoke_test_site.py vps --base-url http://127.0.0.1:43817/site"
